name: Deploy Vault Helm

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, macos]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Uninstall existing Helm release and clean up resources
        run: |
          # Uninstall the Helm release if it exists (removes StatefulSet,
          # Services, ConfigMaps, ServiceAccount, RBAC managed by the chart)
          helm uninstall vault --ignore-not-found 2>/dev/null || true

          # Remove PVC created by the StatefulSet volumeClaimTemplate
          # (not managed by Helm uninstall — must be deleted manually)
          kubectl delete pvc data-vault-0 --ignore-not-found --wait=false || true

          # Remove our wrapper-chart PV and logrotate ConfigMap
          kubectl patch pv vault-data-pv -p '{"metadata":{"finalizers":null}}' 2>/dev/null || true
          kubectl delete pv vault-data-pv --ignore-not-found --wait=false || true
          kubectl delete configmap vault-minikube-logrotate --ignore-not-found --wait=false || true

      - name: Wait for resources to finish terminating
        run: |
          echo "Waiting for StatefulSet pod to terminate..."
          until ! kubectl get pod vault-0 2>/dev/null | grep -q vault-0; do
            echo "Pod still terminating..."; sleep 3
          done
          echo "Waiting for PVC to terminate..."
          until ! kubectl get pvc data-vault-0 2>/dev/null | grep -q data-vault-0; do
            echo "PVC still terminating..."; sleep 3
          done
          echo "Waiting for PV to terminate..."
          until ! kubectl get pv vault-data-pv 2>/dev/null | grep -q vault-data-pv; do
            kubectl patch pv vault-data-pv -p '{"metadata":{"finalizers":null}}' 2>/dev/null || true
            echo "PV still terminating..."; sleep 3
          done
          echo "All resources terminated."

      - name: Deploy Vault
        run: bash scripts/helm-deploy.sh
